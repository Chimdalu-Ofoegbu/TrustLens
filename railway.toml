# Railway config-as-code. Builds from the Dockerfile; Railway waits for
# /healthz to return 200 before routing traffic, and restarts on failure.
# Public domain, target port (8000), region, and env vars are set in the
# Railway dashboard — see submission/RUNBOOK.md.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/healthz"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
